<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Cofradía</title>

  <link rel="stylesheet" href="styles.css">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <h1>Importar personas</h1>

  <!-- 🔐 AUTH -->
  <div class="auth">
    <button onclick="login()">🔐 Iniciar sesión</button>
    <button onclick="logout()">🚪 Salir</button>
  </div>

  <!-- 📁 CSV -->
  <input type="file" id="csvFile" accept=".csv" style="display:none">

  <button class="btn-archivo" onclick="document.getElementById('csvFile').click()">
    📁 Elegir CSV
  </button>

  <button class="btn-importar" onclick="importarCSV()">⬆️ Importar</button>

  <!-- 🔍 BUSCADOR -->
 <div class="buscador-wrapper">
  <div class="buscador-container">
    <span class="icono">🔍</span>

    <input 
      type="text" 
      id="buscador" 
      placeholder="Buscar por nombre, dirección..."
      oninput="buscar(this.value)"
    />
  </div>

  <button class="btn-limpiar" onclick="limpiarBusqueda()">
    ❌ Limpiar
  </button>
</div>
  <hr>

  <!-- 📊 RESUMEN -->
  <div id="resumen" class="resumen"></div>

  <!-- ➕ FORMULARIO -->
  <h2>Añadir persona</h2>
<div class="menu"></div>
 <button onclick="descargarRecibosPDF()">📄 Exportar PDF</button>
<input id="precio" type="number" placeholder="Precio €" style="width:100px;">
<button onclick="imprimirRecibos()">🖨️ A4 (3)</button>
 <button class="btn-filtro" onclick="verPendientes(this)">❌ Pendientes</button>
<button class="btn-filtro" onclick="verPagados(this)">💳 Pagados</button>
<button class="btn-filtro" onclick="verActivos(this)">🟢 Activos</button>
<button class="btn-filtro" onclick="verTodos(this)">👥 Todos</button>
<button onclick="irListado()">📄 Listado PDF</button>
<button onclick="irAFiltros()">🔍 Filtros avanzados</button>
<button onclick="hacerBackup()">💾 Copia de seguridad</button>
<input type="file" onchange="restaurarBackup(event)">
</div>
  <!-- 📋 LISTA -->
  <h2>Personas</h2>
  <div id="lista"></div>
<div id="pantallaFiltros" style="display:none; padding:10px;">

  <h2>Filtros</h2>

  <label>Año nacimiento</label>
  <input type="number" id="filtroAnio" placeholder="Ej: 1980">

  <label>Calle</label>
  <input type="text" id="filtroCalle" placeholder="Ej: Canal">

  <label>Nombre / Apellidos</label>
  <input type="text" id="filtroNombre" placeholder="Ej: García">

  <label>Provincia</label>
  <input type="text" id="filtroProvincia" placeholder="Ej: Zaragoza">

  <br><br>

  <button onclick="verResultados()">🔍 Ver resultados</button>
  <button onclick="pdfFiltrado()">📄 Generar PDF</button>
  <button onclick="volver()">⬅️ Volver</button>

  <hr>

  <div id="resultadosFiltros"></div>

</div>

  <!-- 🔥 FIREBASE (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <!-- 🚀 APP -->
 <!-- 🔥 LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 🔥 TU APP -->
<script src="app.js"></script>
<script src="recibos.js"></script>
<script src="filtros.js"></script>
<script src="listado.js"></script>
  <div id="modalForm" class="modal hidden">
  <div class="modal-content">

    <h2>➕ Nueva persona</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="apellido1" placeholder="Apellido 1">
    <input id="apellido2" placeholder="Apellido 2">
    <input id="direccion" placeholder="Dirección">
    <input id="poblacion" placeholder="Población">
    <input id="provincia" placeholder="Provincia">
    <input id="cp" placeholder="Código postal">
    <input id="fecha" placeholder="Fecha nacimiento">

    <div class="modal-buttons">
     <button id="btnGuardar" class="btn-save" onclick="guardarPersona()">💾 Guardar</button>
      <button onclick="cerrarFormulario()">❌ Cancelar</button>
    </div>

  </div>
</div>
<button class="fab" onclick="abrirFormulario()">➕</button>
<div id="modalForm" class="modal hidden">

  <div class="modal-header">
    <button onclick="cerrarFormulario()">←</button>
    <h2>Nueva persona</h2>
  </div>

  
</div>
<div id="toast" class="toast hidden"></div>
</body>
</html>
