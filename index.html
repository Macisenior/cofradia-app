<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cofradía</title>

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<body>

<h1>Importar personas</h1>

<div class="auth">
  <button onclick="login()">🔐 Iniciar sesión</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<label class="btn-archivo">
  📁 Elegir CSV
  <input type="file" id="csvFile" hidden>
</label>

<input type="file" id="csvFile" accept=".csv" style="display:none">

<button class="btn-archivo" onclick="document.getElementById('csvFile').click()">
  📁 Elegir CSV
</button>

<button class="btn-importar" onclick="importarCSV()">⬆️ Importar</button>
<input type="text" id="buscador" placeholder="Buscar por nombre o calle..." />
<hr>
<button class="btn-filtro" onclick="verPendientes()">Ver pendientes</button>
<button class="btn-filtro" onclick="cargarPersonas()">Ver todos</button>

<div id="resumen" class="resumen"></div>
<h2>Añadir persona</h2>

<div class="formulario">
  <input id="nombre" placeholder="Nombre">
  <input id="apellido1" placeholder="Apellido 1">
  <input id="apellido2" placeholder="Apellido 2">
  <input id="direccion" placeholder="Dirección">
  <input id="poblacion" placeholder="Población">
  <input id="provincia" placeholder="Provincia">
  <input id="cp" placeholder="Código postal">
  <input id="fecha" placeholder="Fecha nacimiento (YYYY-MM-DD)">

  <button class="btn-add" onclick="añadirPersona()">➕ Añadir</button>
</div>
<h2>Personas</h2>
<div id="lista"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>



<script src="app.js"></script>

</body>
</html>
